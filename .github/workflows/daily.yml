name: News Digest (3x/day)

on:
  schedule:
    # Mục tiêu: GỬI 3 lần/ngày đúng GIỜ ROME 07:00 / 13:00 / 22:00, quanh năm.
    # GitHub cron luôn chạy theo UTC và KHÔNG tự đổi giờ mùa (DST), nên ta khai báo
    # cả hai bộ giờ — mùa hè và mùa đông Rome — rồi để bước "Gate" bên dưới bỏ qua
    # những lần không khớp giờ Rome. Nhờ vậy luôn còn đúng 3 lần gửi/ngày, không cần
    # sửa tay khi đổi mùa.
    #   Mùa hè  CEST = UTC+2 → 07/13/22 Rome = 05/11/20 UTC
    #   Mùa đông CET = UTC+1 → 07/13/22 Rome = 06/12/21 UTC
    - cron: '0 5,6,11,12,20,21 * * *'
  workflow_dispatch: {}         # cho phép chạy tay để test (luôn chạy, bỏ qua Gate)

permissions:
  contents: write               # cần để commit digest + state ngược repo

concurrency:
  group: news-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15        # chặn trên: một feed/treo bất ngờ không đốt cả tiếng Actions
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Gate to 07/13/22 Rome local time
        id: gate
        run: |
          # Chạy tay (workflow_dispatch) thì LUÔN tiếp tục.
          # Lịch (schedule) chỉ tiếp tục nếu giờ-Rome hiện tại là 07, 13 hoặc 22.
          # Nhờ TZ=Europe/Rome, DST được xử lý tự động: trong 6 lần cron/ngày chỉ có
          # đúng 3 lần khớp giờ Rome, 3 lần còn lại thoát ngay (no-op vài giây).
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Manual/non-schedule run → proceed"
            exit 0
          fi
          HOUR=$(TZ=Europe/Rome date +%H)
          echo "Rome local hour: $HOUR"
          case "$HOUR" in
            07|13|22)
              echo "run=true"  >> "$GITHUB_OUTPUT"
              echo "Target Rome hour → proceed" ;;
            *)
              echo "run=false" >> "$GITHUB_OUTPUT"
              echo "Off-hour for Rome → skip this run" ;;
          esac

      - name: Setup Python
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install deps
        if: steps.gate.outputs.run == 'true'
        run: pip install -r requirements.txt

      - name: Run digest
        if: steps.gate.outputs.run == 'true'
        env:
          # Lịch đã cố định 3 lần/ngày (07:00 / 13:00 / 22:00 giờ Rome) nên mỗi lần chạy là
          # một lần GỬI: chỉ cần có >=1 tin mới là gửi, không gom-chờ.
          DIGEST_MIN_ITEMS: '1'
          API_KEY: ${{ secrets.API_KEY }}
          # Mặc định DeepSeek. Muốn dùng Claude qua OpenRouter:
          #   đặt repo Variable API_BASE_URL = https://openrouter.ai/api/v1
          #   và API_MODEL = anthropic/claude-3.5-sonnet  (hoặc model Claude khác)
          API_BASE_URL: ${{ vars.API_BASE_URL || 'https://api.deepseek.com' }}
          API_MODEL: ${{ vars.API_MODEL || 'deepseek-chat' }}
          # Gửi email qua Resend (tùy chọn — thiếu RESEND_API_KEY thì bỏ qua).
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ vars.EMAIL_TO || 'hieuvuongforwork@gmail.com' }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM || 'onboarding@resend.dev' }}
        run: python scripts/main.py

      - name: Commit results
        if: steps.gate.outputs.run == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily/ data/ docs/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Không có thay đổi — không có tin mới."
          else
            git commit -m "digest: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Notify on failure
        if: failure() && steps.gate.outputs.run == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ vars.EMAIL_TO || 'hieuvuongforwork@gmail.com' }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM || 'onboarding@resend.dev' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python scripts/notify_failure.py
