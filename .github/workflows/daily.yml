name: News Digest (3x/day)

on:
  schedule:
    # Mục tiêu: ~3 bản/ngày quanh 07:00 / 13:00 / 22:00 giờ Rome, quanh năm.
    # GitHub Actions cron chạy theo UTC, KHÔNG tự đổi giờ mùa (DST) và hay bắn TRỄ
    # (đôi khi 1–3h) hoặc rớt hẳn. Vì vậy KHÔNG còn cổng chặn-đúng-giờ (bắn trễ là cả
    # buổi bị bỏ). Thay vào đó: bắn 6 tick/ngày thành 3 CẶP (mỗi cặp cách ~1h, phủ cả
    # CEST/CET) rồi để "van tiết lưu" trong scripts/dedup.py (DIGEST_MIN_SEND_GAP_HOURS,
    # mặc định 4h) chỉ cho tick ĐẦU mỗi cụm gửi, chặn tick quá gần. Trễ/rớt một tick
    # vẫn còn tick kia trong cặp → không mất buổi.
    #   Mùa hè  CEST = UTC+2 → 05/11/20 UTC ≈ 07/13/22 Rome
    #   Mùa đông CET = UTC+1 → 05/11/20 UTC ≈ 06/12/21 Rome (sớm ~1h, chấp nhận được)
    - cron: '0 5,6,11,12,20,21 * * *'
  workflow_dispatch: {}         # chạy tay để test — GỬI NGAY (đặt DIGEST_FORCE_SEND=1)

permissions:
  contents: write               # cần để commit digest + state ngược repo

concurrency:
  group: news-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15        # chặn trên: một feed/treo bất ngờ không đốt cả tiếng Actions
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          # Có >=1 tin mới là đủ để gửi; nhịp ~3 bản/ngày do "van tiết lưu" 4h trong
          # scripts/dedup.py điều tiết (xem ghi chú khối schedule), không chặn-đúng-giờ nữa.
          DIGEST_MIN_ITEMS: '1'
          # Chạy tay -> gửi ngay (bỏ van); chạy theo lịch -> để trống (áp van bình thường).
          DIGEST_FORCE_SEND: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
          API_KEY: ${{ secrets.API_KEY }}
          # Mặc định DeepSeek. Muốn dùng Claude qua OpenRouter:
          #   đặt repo Variable API_BASE_URL = https://openrouter.ai/api/v1
          #   và API_MODEL = anthropic/claude-3.5-sonnet  (hoặc model Claude khác)
          API_BASE_URL: ${{ vars.API_BASE_URL || 'https://api.deepseek.com' }}
          API_MODEL: ${{ vars.API_MODEL || 'deepseek-chat' }}
          # Gửi email qua Resend (tùy chọn — thiếu RESEND_API_KEY thì bỏ qua).
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ vars.EMAIL_TO || 'hieuvuongforwork@gmail.com' }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM || 'onboarding@resend.dev' }}
        run: python scripts/main.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily/ data/ docs/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Không có thay đổi — không có tin mới."
          else
            git commit -m "digest: $(date -u +'%Y-%m-%d %H:%M UTC')"
            # Đẩy lên với rebase + thử lại: nếu một run khác vừa push (đua nhau),
            # ta rebase lên main mới rồi push lại, tránh lỗi non-fast-forward giả.
            # Dùng "if" để không bị 'bash -e' thoát giữa chừng; chỉ fail thật khi
            # đã thử hết 5 lần mà vẫn không push được.
            pushed=false
            for i in 1 2 3 4 5; do
              if git pull --rebase --autostash origin main && git push; then
                pushed=true
                break
              fi
              echo "Push bị từ chối do đua commit — thử lại lần $i..."
              sleep 5
            done
            if [ "$pushed" != true ]; then
              echo "::error::Không push được sau 5 lần thử."
              exit 1
            fi
          fi

      - name: Notify on failure
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ vars.EMAIL_TO || 'hieuvuongforwork@gmail.com' }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM || 'onboarding@resend.dev' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python scripts/notify_failure.py
