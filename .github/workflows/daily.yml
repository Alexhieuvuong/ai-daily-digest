name: News Digest (6h)

on:
  schedule:
    # 4 lần/ngày, cách nhau 6 tiếng. Giờ gửi mong muốn: 06:00 / 12:00 / 18:00 / 00:00
    # theo múi UTC+2  →  quy ra UTC là 04 / 10 / 16 / 22. (GitHub cron luôn dùng UTC,
    # và lịch chạy có thể trễ vài phút–chục phút tùy tải của Actions.)
    - cron: '0 4,10,16,22 * * *'
  workflow_dispatch: {}         # cho phép chạy tay để test

permissions:
  contents: write               # cần để commit digest + state ngược repo

concurrency:
  group: news-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15        # chặn trên: một feed/treo bất ngờ không đốt cả tiếng Actions
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          # Lịch đã cố định 4 lần/ngày (mỗi 6h) nên mỗi lần chạy là một lần GỬI: chỉ cần
          # có >=1 tin mới là gửi, không gom-chờ như mô hình chạy 4h trước đây.
          DIGEST_MIN_ITEMS: '1'
          API_KEY: ${{ secrets.API_KEY }}
          # Mặc định DeepSeek. Muốn dùng Claude qua OpenRouter:
          #   đặt repo Variable API_BASE_URL = https://openrouter.ai/api/v1
          #   và API_MODEL = anthropic/claude-3.5-sonnet  (hoặc model Claude khác)
          API_BASE_URL: ${{ vars.API_BASE_URL || 'https://api.deepseek.com' }}
          API_MODEL: ${{ vars.API_MODEL || 'deepseek-chat' }}
          # Gửi email qua Resend (tùy chọn — thiếu RESEND_API_KEY thì bỏ qua).
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ vars.EMAIL_TO || 'hieuvuongforwork@gmail.com' }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM || 'onboarding@resend.dev' }}
        run: python scripts/main.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily/ data/ docs/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Không có thay đổi — không có tin mới."
          else
            git commit -m "digest: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Notify on failure
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ vars.EMAIL_TO || 'hieuvuongforwork@gmail.com' }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM || 'onboarding@resend.dev' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python scripts/notify_failure.py
